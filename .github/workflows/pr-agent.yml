name: PR Agent

# Schedule when the workflow runs
on:
  # Run on schedule (cron format: minute hour day month weekday)
  schedule:
    # Weekdays at 9 AM UTC (adjust for your timezone)
    - cron: '0 9 * * 1-5'
  
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip sending notifications)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Permissions needed for the workflow
permissions:
  contents: read
  pull-requests: read

jobs:
  send-pr-reminders:
    name: Send PR Notifications
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
      
      # Step 4: Run the PR agent
      - name: Run PR Agent
        env:
          # GitHub token for API access
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          
          # Slack configuration
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          
          # Email configuration
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          
          # Optional: Dry run mode
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "Starting PR Agent..."
          echo "Dry run mode: $DRY_RUN"
          node src/index.js
      
      # Step 5: Upload logs as artifact (for debugging)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-reminder-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
          if-no-files-found: ignore
