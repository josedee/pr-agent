<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Filter - Option 2: Horizontal Scroll</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            padding: 40px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        
        .description {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        /* Option 2: Horizontal Scrollable */
        .filter-container {
            margin-bottom: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .clear-btn {
            padding: 4px 12px;
            background: transparent;
            color: #dc3545;
            border: 1px solid #dc3545;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .clear-btn:hover {
            background: #dc3545;
            color: white;
        }
        
        .scroll-container {
            position: relative;
        }
        
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: #ddd transparent;
        }
        
        .filter-buttons::-webkit-scrollbar {
            height: 6px;
        }
        
        .filter-buttons::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .filter-buttons::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }
        
        .filter-buttons::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }
        
        .repo-btn {
            padding: 8px 16px;
            background: white;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .repo-btn:hover {
            background: #e8f4ff;
            border-color: #0066cc;
            color: #0066cc;
        }
        
        .repo-btn.active {
            background: linear-gradient(135deg, #0066cc 0%, #3b82f6 100%);
            color: white;
            border-color: #0066cc;
        }
        
        /* Sample repository groups */
        .repo-group {
            margin-bottom: 24px;
            padding: 20px;
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
        }
        
        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .repo-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .pr-count {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Option 2: Horizontal Scrollable Row</h1>
        <p class="description">Repository buttons in a single scrollable horizontal row. Good for many repositories.</p>
        
        <div class="filter-container">
            <div class="filter-header">
                <span class="filter-label">Filter by Repository:</span>
                <button class="clear-btn">Clear Filters</button>
            </div>
            <div class="scroll-container">
                <div class="filter-buttons">
                    <button class="repo-btn active">owner/frontend-app</button>
                    <button class="repo-btn">owner/backend-api</button>
                    <button class="repo-btn active">owner/mobile-app</button>
                    <button class="repo-btn">owner/data-pipeline</button>
                    <button class="repo-btn">owner/infrastructure</button>
                    <button class="repo-btn">owner/analytics-service</button>
                    <button class="repo-btn">owner/auth-service</button>
                </div>
            </div>
        </div>
        
        <div class="repo-group">
            <div class="repo-header">
                <span class="repo-name">owner/frontend-app</span>
                <span class="pr-count">3 PRs</span>
            </div>
        </div>
        
        <div class="repo-group">
            <div class="repo-header">
                <span class="repo-name">owner/mobile-app</span>
                <span class="pr-count">2 PRs</span>
            </div>
        </div>
    </div>
</body>
</html>
