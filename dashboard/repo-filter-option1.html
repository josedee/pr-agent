<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Filter - Option 1: Dropdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            padding: 40px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        
        .description {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        /* Option 1: Dropdown Select */
        .filter-container {
            margin-bottom: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .filter-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .select-wrapper {
            position: relative;
            display: inline-block;
            min-width: 300px;
        }
        
        select {
            width: 100%;
            padding: 10px 40px 10px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            appearance: none;
            transition: all 0.2s ease;
        }
        
        select:hover {
            border-color: #0066cc;
        }
        
        select:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }
        
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #666;
            font-size: 10px;
        }
        
        /* Sample repository groups */
        .repo-group {
            margin-bottom: 24px;
            padding: 20px;
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
        }
        
        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .repo-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .pr-count {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Option 1: Dropdown Select</h1>
        <p class="description">Single dropdown menu to filter repositories. Most compact option.</p>
        
        <div class="filter-container">
            <label class="filter-label">Filter by Repository:</label>
            <div class="select-wrapper">
                <select>
                    <option value="">All Repositories</option>
                    <option value="repo1">owner/frontend-app</option>
                    <option value="repo2">owner/backend-api</option>
                    <option value="repo3">owner/mobile-app</option>
                    <option value="repo4">owner/data-pipeline</option>
                    <option value="repo5">owner/infrastructure</option>
                </select>
            </div>
        </div>
        
        <div class="repo-group">
            <div class="repo-header">
                <span class="repo-name">owner/frontend-app</span>
                <span class="pr-count">3 PRs</span>
            </div>
        </div>
        
        <div class="repo-group">
            <div class="repo-header">
                <span class="repo-name">owner/backend-api</span>
                <span class="pr-count">5 PRs</span>
            </div>
        </div>
        
        <div class="repo-group">
            <div class="repo-header">
                <span class="repo-name">owner/mobile-app</span>
                <span class="pr-count">2 PRs</span>
            </div>
        </div>
    </div>
</body>
</html>
