<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>PR Dashboard</h1>
                </div>
                <div class="header-actions">
                    <button id="refreshBtn" class="btn btn-secondary" title="Refresh data">
                        <span class="btn-text">Refresh</span>
                    </button>
                    <button id="themeToggle" class="btn btn-icon" title="Toggle theme">
                        <span class="icon">Dark</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Loading State -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading PR data...</p>
            </div>

            <!-- Error State -->
            <div id="error" class="error-state" style="display: none;">
                <h2>Failed to Load Data</h2>
                <p id="errorMessage"></p>
                <button onclick="loadDashboardData()" class="btn btn-primary">Try Again</button>
            </div>

            <!-- Dashboard Content -->
            <div id="dashboard" style="display: none;">
                <!-- Stats Overview -->
                <section class="stats-section">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-content">
                                <div class="stat-value" id="totalPRs">0</div>
                                <div class="stat-label">Total Pull Requests</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-content">
                                <div class="stat-value" id="totalReviewers">0</div>
                                <div class="stat-label">Active Reviewers</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-content">
                                <div class="stat-value" id="priorityPRs">0</div>
                                <div class="stat-label">Old PRs (>10 days)</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-content">
                                <div class="stat-value" id="oldestPR">0d</div>
                                <div class="stat-label">Oldest PR</div>
                            </div>
                        </div>
                    </div>
                    <div class="last-updated">
                        Last updated: <span id="lastUpdated">-</span>
                    </div>
                </section>

                <!-- Filters and Search -->
                <section class="filters-section">
                    <div class="filters-container">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search PRs..." />
                        </div>
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-view="all">All PRs</button>
                            <button class="filter-btn" data-view="priority">Priority</button>
                            <button class="filter-btn" data-view="reviewer">By Reviewer</button>
                            <button class="filter-btn" data-view="repository">By Repository</button>
                        </div>
                    </div>
                </section>

                <!-- PR Lists -->
                <section class="content-section">
                    <!-- All PRs View -->
                    <div id="allPRsView" class="view-container">
                        <h2 class="section-title">All Open PRs</h2>
                        <div id="allPRsList" class="pr-list"></div>
                    </div>

                    <!-- Priority PRs View -->
                    <div id="priorityView" class="view-container" style="display: none;">
                        <h2 class="section-title">Old PRs (10+ days old)</h2>
                        <div id="priorityPRsList" class="pr-list"></div>
                    </div>

                    <!-- By Reviewer View -->
                    <div id="reviewerView" class="view-container" style="display: none;">
                        <!-- Reviewer Filters -->
                        <div id="reviewerFilters" class="reviewer-filters" style="display: none;"></div>
                        
                        <div id="reviewerList" class="reviewer-list"></div>
                    </div>

                    <!-- By Repository View -->
                    <div id="repositoryView" class="view-container" style="display: none;">
                        <!-- Repository Filters -->
                        <div id="repositoryFilters" class="repository-filters" style="display: none;"></div>
                        
                        <div id="repositoryList" class="repository-list"></div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Thats all for now !!!</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
