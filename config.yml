# PR Agent Configuration
# Copy this file to config.yml and update with your values

# GitHub repositories to monitor
repositories:
  - owner: apache
    repos:
      - incubator-kie-drools
      - incubator-kie-kogito-runtimes
      - incubator-kie-kogito-apps

# Notification settings
notification:
  # Notification frequency (cron format)
  # Examples:
  # - "0 9 * * 1-5" = Weekdays at 9 AM
  # - "0 9 * * 1" = Every Monday at 9 AM
  # - "0 9,15 * * 1-5" = Weekdays at 9 AM and 3 PM
  frequency:
    slack: "0 9 * * 1-5"  # Weekdays at 9 AM
    email: "0 9 * * 1"     # Mondays at 9 AM
  
  # Slack configuration
  slack:
    enabled: false
    # Webhook URL should be stored in GitHub Secrets as SLACK_WEBHOOK_URL
    channel: "#pr-reviews"
    mention_users: true  # Use @username mentions
  
  # Email configuration
  email:
    enabled: false
    # SMTP settings
    smtp_server: smtp.gmail.com
    smtp_port: 587
    # Email credentials should be stored in GitHub Secrets
    # EMAIL_FROM and EMAIL_PASSWORD
    from_name: "PR Reminder Bot"

# Reviewer mapping
# Maps GitHub usernames to Slack IDs and email addresses
reviewers:
  # - github_username: jane_smith
  #   slack_id: U987654321
  #   email: jane.smith@company.com
  #   name: Jane Smith
  
  # Add more reviewers as needed
  # - github_username: another_user
  #   slack_id: UXXXXXXXXX
  #   email: user@company.com
  #   name: Another User

# Optional: Filter settings
filters:
  # Only remind about PRs older than X hours (0 = all PRs)
  min_age_hours: 0
  
  # Exclude draft PRs
  exclude_drafts: true
  
  # Exclude PRs with specific labels
  exclude_labels:
    - "work-in-progress"
    - "do-not-merge"
